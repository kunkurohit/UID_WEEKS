<!DOCTYPE html>
<html>
<head>
    <title>Rotating Square</title>

    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
        }

        h1 {
            margin-bottom: 40px;
        }

        .box {
            width: 120px;
            height: 120px;
            background-color: red;
            margin: auto;

            /* animation applied */
            animation: spin 3s linear infinite;
        }

        /* keyframes for rotation */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <h1>Rotating Square</h1>

    <div class="box"></div>

</body>
</html>
