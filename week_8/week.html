<!DOCTYPE html>
<html>
<head>
    <title>Moving Rotating Circle</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .circle {
            width: 100px;
            height: 100px;
            background-color: orange;
            border-radius: 50%;
            position: relative;

            /* animation */
            animation: moveRotate 4s linear infinite;
        }

        /* keyframes */
        @keyframes moveRotate {
            0% {
                left: 0;
                transform: rotate(0deg);
            }
            50% {
                left: 300px;
                transform: rotate(180deg);
            }
            100% {
                left: 0;
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <h1>Circle Animation</h1>

    <div class="circle"></div>

</body>
</html>_
